name: SLC Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  slc-review:
    if: |
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review') &&
      !contains(github.event.pull_request.labels.*.name, 'tiny')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run SLC Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request using our SLC (Simple, Lovable, Complete) principles for the IdeaSpaces SDK.

            ## Context
            - This repo: `@ideaspaces/sdk` — the **platform layer**. The shape primitives now live in `@ideaspaces/protocol`; SDK re-exports them (`export * from "@ideaspaces/protocol"`) so existing consumers are unchanged, and is where platform code (sync, auth, API client) will be added over time.
            - Today SDK is essentially `src/index.ts` (the re-export) + `src/index.test.ts` (a full-surface guard asserting every re-exported symbol resolves). Shape logic and its review belong in the protocol repo, not here.
            - One runtime dep: `@ideaspaces/protocol`, pinned to a tag. ESM-only via `tsc`; tests via vitest.
            - Reference: monorepo CLAUDE.md (root principles); `@ideaspaces/protocol` for the shape itself.

            ## SLC label context
            - `slc:simple` / `slc:lovable` / `slc:complete`: quick validation for labeled dimensions, deeper review for unlabeled.
            - `needs:slc-review`: do deeper analysis.
            - No SLC labels: standard full review.

            ## SLC Framework Review

            ### Simple 🎯
            - Is this the simplest implementation that solves the problem?
            - Functional API preferred over class wrappers unless state lifecycle earns one.
            - Does it avoid pulling in deps when stdlib + Node primitives would do (filesystem, child_process, no js-yaml unless real semantic parsing is needed)?
            - Any unnecessary new abstractions?

            ### Lovable ❤️
            - Consumers (cli, mcp-server, the plugin) import from `@ideaspaces/sdk` without ceremony; the re-export keeps that surface stable.
            - Platform additions, when they come: clear types, predictable defaults, error paths fail safely.
            - The re-export stays complete — if the protocol surface grows, consumers can reach it through the SDK.

            ### Complete 🏁
            - Tests cover happy paths AND edge cases (vitest with tmpdir fixtures preferred for fs-touching primitives)?
            - No shape logic re-implemented here (it belongs in `@ideaspaces/protocol`); no unused imports or dead code.
            - `tsc --noEmit` clean; `npm test` passes; `npm run build` produces ESM in `dist/`.
            - Type exports (re-exports in `index.ts`) cover what consumers actually need.

            ## SDK-specific checks
            - **Stay a thin re-export.** Shape primitives (frontmatter, `_agent/` contract, awareness, git, drift) live in `@ideaspaces/protocol`. Don't re-implement or fork them here.
            - **Keep the re-export complete.** The full-surface guard test (`src/index.test.ts`) must assert every symbol consumers rely on; a protocol rename/drop should fail SDK CI loudly, not silently break consumers.
            - **Protocol dep stays pinned** to a tag; bump deliberately.
            - **Platform code, when added,** is the only thing that belongs here (sync/auth/API client) — functional API, async I/O, cross-platform paths via `node:path`.

            ## Anti-pattern detection 🚨
            - Re-implementing or forking shape logic that belongs in `@ideaspaces/protocol`.
            - Speculative platform API no consumer needs yet.
            - Adding runtime deps without earning them (SDK's only runtime dep is `@ideaspaces/protocol`; stdlib + Node primitives first).
            - Letting the re-export drift from the protocol's actual surface.

            ## Output format

            **SLC Assessment:**
            - ✅/⚠️/❌ Simple: [brief assessment]
            - ✅/⚠️/❌ Lovable: [brief assessment]
            - ✅/⚠️/❌ Complete: [brief assessment]

            **Anti-Patterns Found:** [list or "None detected"]

            **SDK-Specific Issues:** [list or "None detected"]

            **Detailed Feedback:** [specific issues and suggestions]

            **Recommendation:** Approve / Request Changes / Comment

            Use `gh pr comment` to post your review.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
